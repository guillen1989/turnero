<div style="font-family: Arial, sans-serif; max-width: 480px; margin: 0 auto; color: #1a1a1a;">
  <h2 style="color: #1a1a1a;">{{ _('Nuevo mensaje de feedback') }}</h2>
  <p><strong>{{ _('Tipo') }}:</strong> {{ tipo_label }}</p>
  {% if email_contacto %}
    <p><strong>{{ _('Contacto') }}:</strong> {{ email_contacto }}</p>
  {% endif %}
  <p style="white-space: pre-wrap; background: #f5f5f5; border-radius: 6px; padding: 12px 16px;">{{ descripcion }}</p>
  <p style="text-align: center; margin: 32px 0;">
    <a href="{{ enlace }}"
       style="background-color: #2563eb; color: #ffffff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold; display: inline-block;">
      {{ _('Ver en el panel de administración') }}
    </a>
  </p>
</div>
