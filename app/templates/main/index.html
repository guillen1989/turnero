{% extends "base.html" %}

{% block content %}
<div class="hero">
  <h1>{{ _('Turnero') }}</h1>
  <p>{{ _('Intercambia turnos con tus compañeros de forma sencilla.') }}</p>
  <div class="btn-group">
    <a href="{{ url_for('auth.registro') }}" class="btn btn-primary">{{ _('Crear cuenta') }}</a>
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary">{{ _('Entrar') }}</a>
    {% if demo_login_enabled and demo_supervisora_login_enabled %}
    <form method="POST" action="{{ url_for('auth.login_demo') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="tipo" value="trabajador">
      <button type="submit" class="btn btn-secondary">{{ _('Probar con cuenta demo (trabajador)') }}</button>
    </form>
    <form method="POST" action="{{ url_for('auth.login_demo') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="tipo" value="supervisora">
      <button type="submit" class="btn btn-secondary">{{ _('Probar con cuenta demo (supervisora)') }}</button>
    </form>
    {% elif demo_login_enabled %}
    <form method="POST" action="{{ url_for('auth.login_demo') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit" class="btn btn-secondary">{{ _('Probar con una cuenta demo') }}</button>
    </form>
    {% endif %}
  </div>
</div>
{% endblock %}
