# WeasyPrint (generación del PDF de la hoja de cambio) necesita estas
# librerías nativas de sistema en tiempo de ejecución (Pango/cairo/
# gdk-pixbuf vía cffi). Sin esto, el import de weasyprint falla con
# OSError al cargar libgobject-2.0 (ver PROGRESS.md, Fase 10, incidente
# del 2026-07-16).
#
# Primer intento con nixPkgs no funcionó: los paquetes Nix no quedan en
# el path que usa el linker dinámico (dlopen/cffi) del runtime de
# Railway. aptPkgs instala en las rutas de sistema estándar
# (/usr/lib/...), que es donde dlopen ya busca sin configuración extra —
# son los mismos paquetes que recomienda la documentación oficial de
# WeasyPrint para Debian/Ubuntu.
[phases.setup]
aptPkgs = [
    "libpango-1.0-0",
    "libpangoft2-1.0-0",
    "libpangocairo-1.0-0",
    "libcairo2",
    "libgdk-pixbuf2.0-0",
    "libglib2.0-0",
    "shared-mime-info",
    "fonts-dejavu-core",
]
